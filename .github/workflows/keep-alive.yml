name: Keep Streamlit App Awake

# Streamlit Community Cloud (hosting gratis) otomatis "menidurkan" app
# kalau nggak ada yang buka selama 12 jam. Workflow ini jalan otomatis
# tiap 6 jam (2x lipat lebih cepat dari batas 12 jam), cukup buka
# halaman app-nya sebentar -- itu sudah dianggap "ada trafik" oleh
# Streamlit, jadi jam tidurnya kereset terus dan app-nya nggak akan
# pernah nyampe 12 jam nganggur.
#
# GRATIS 100% -- GitHub Actions kasih jatah gratis buat repo publik
# tanpa batas, dan buat repo privat pun jatah gratisnya (2000
# menit/bulan) jauh lebih dari cukup, karena tiap jalan cuma
# beberapa detik.

on:
  schedule:
    # Jalan tiap 6 jam (00:00, 06:00, 12:00, 18:00 UTC).
    # Format cron: menit jam tanggal bulan hari -- "*" artinya "semua".
    - cron: "0 */6 * * *"
  # Biar bisa dipicu manual juga lewat tab "Actions" di GitHub kalau
  # perlu tes/jalanin sekarang tanpa nunggu jadwal.
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Buka halaman app biar dianggap "ada trafik"
        run: |
          curl --silent --show-error --max-time 30 \
            --output /dev/null \
            --write-out "Status: %{http_code}\n" \
            https://sahampro.streamlit.app
